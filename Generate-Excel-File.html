<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AUS Excel Generator - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 32px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 40px;
            font-size: 16px;
        }
        .info {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: right;
            direction: rtl;
        }
        .info h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .info ul {
            list-style: none;
            padding: 0;
        }
        .info li {
            padding: 8px 0;
            color: #34495e;
        }
        .info li:before {
            content: "✅ ";
            margin-left: 10px;
        }
        .btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 10px;
            color: #2e7d32;
            font-weight: bold;
            display: none;
        }
        .loading {
            margin-top: 20px;
            color: #667eea;
            font-size: 18px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 AUS Maintenance System</h1>
        <p class="subtitle">Professional Excel File Generator</p>
        
        <div class="info">
            <h3>📊 محتوى الملف:</h3>
            <ul>
                <li>Dashboard تفاعلي مع KPIs</li>
                <li>جدول 32 مهمة كاملة</li>
                <li>رسوم بيانية (Pie + Bar Charts)</li>
                <li>تحليلات متقدمة</li>
                <li>ملخص تنفيذي</li>
                <li>تنسيق احترافي بالألوان</li>
            </ul>
        </div>
        
        <button class="btn" onclick="generateExcel()">
            📥 إنشاء وتنزيل ملف Excel الاحترافي
        </button>
        
        <div class="loading" id="loading">⏳ جاري إنشاء الملف...</div>
        <div class="status" id="status">✅ تم! الملف جاهز في Downloads</div>
    </div>

    <script>
        async function generateExcel() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('status').style.display = 'none';

            try {
                // تحميل البيانات
                const response = await fetch('AUS_Maintenance_Data.json');
                const data = await response.json();
                const tasks = data.tasks;

                // إنشاء Workbook
                const wb = XLSX.utils.book_new();

                // ========== SHEET 1: DASHBOARD ==========
                const completed = tasks.filter(t => t.status.includes('Completed')).length;
                const pending = tasks.length - completed;
                const totalCost = tasks.reduce((sum, t) => sum + t.cost, 0);
                const avgCost = totalCost / tasks.length;
                const completionRate = (completed / tasks.length * 100).toFixed(1);

                const dashboardData = [
                    ['AUS MAINTENANCE SYSTEM - DASHBOARD'],
                    ['Arab Unity School - Academic Year 2025-2026'],
                    [''],
                    ['KEY PERFORMANCE INDICATORS'],
                    ['Metric', 'Value', 'Status'],
                    ['Total Tasks', tasks.length, '📊'],
                    ['Completed Tasks', completed, '✅'],
                    ['Pending Tasks', pending, '⏳'],
                    ['Completion Rate', completionRate + '%', completed > pending ? '✅' : '⚠️'],
                    [''],
                    ['FINANCIAL OVERVIEW'],
                    ['Item', 'Amount (AED)', 'Percentage'],
                    ['Total Cost', totalCost.toLocaleString(), '100%'],
                    ['Completed Cost', tasks.filter(t => t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0).toLocaleString(), ((tasks.filter(t => t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0) / totalCost) * 100).toFixed(1) + '%'],
                    ['Pending Cost', tasks.filter(t => !t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0).toLocaleString(), ((tasks.filter(t => !t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0) / totalCost) * 100).toFixed(1) + '%'],
                    ['Average Cost per Task', avgCost.toLocaleString(), ''],
                    [''],
                    ['PRIORITY BREAKDOWN'],
                    ['Priority', 'Count', 'Percentage'],
                    ['Critical', tasks.filter(t => t.priority.includes('Critical')).length, ((tasks.filter(t => t.priority.includes('Critical')).length / tasks.length) * 100).toFixed(1) + '%'],
                    ['High', tasks.filter(t => t.priority.includes('High')).length, ((tasks.filter(t => t.priority.includes('High')).length / tasks.length) * 100).toFixed(1) + '%'],
                    ['Medium', tasks.filter(t => t.priority.includes('Medium')).length, ((tasks.filter(t => t.priority.includes('Medium')).length / tasks.length) * 100).toFixed(1) + '%'],
                    ['Low', tasks.filter(t => t.priority.includes('Low')).length, ((tasks.filter(t => t.priority.includes('Low')).length / tasks.length) * 100).toFixed(1) + '%'],
                ];

                const wsDash = XLSX.utils.aoa_to_sheet(dashboardData);
                wsDash['!cols'] = [{wch: 30}, {wch: 20}, {wch: 15}];
                XLSX.utils.book_append_sheet(wb, wsDash, 'Dashboard');

                // ========== SHEET 2: TASKS DATA ==========
                const tasksHeaders = ['ID', 'Title', 'Category', 'Location', 'Term', 'Priority', 'Status', 'Assigned To', 'Reported By', 'Date Reported', 'Due Date', 'Date Completed', 'Cost (AED)', 'Vendor', 'Progress (%)', 'Notes'];
                const tasksData = [tasksHeaders];

                tasks.forEach(t => {
                    tasksData.push([
                        t.id,
                        t.title,
                        t.category,
                        t.location,
                        t.term,
                        t.priority.replace(/[🔴🟠🟡🟢]/g, '').trim(),
                        t.status.replace(/[✅⏳🔄⏸️❌]/g, '').trim(),
                        t.assignedTo,
                        t.reportedBy,
                        t.dateReported,
                        t.dueDate,
                        t.dateCompleted || '',
                        t.cost,
                        t.vendor,
                        t.progress,
                        t.notes
                    ]);
                });

                const wsTasks = XLSX.utils.aoa_to_sheet(tasksData);
                wsTasks['!cols'] = [{wch:12},{wch:25},{wch:18},{wch:18},{wch:10},{wch:12},{wch:12},{wch:18},{wch:18},{wch:14},{wch:14},{wch:14},{wch:12},{wch:20},{wch:10},{wch:45}];
                XLSX.utils.book_append_sheet(wb, wsTasks, 'Tasks Data');

                // ========== SHEET 3: ANALYTICS ==========
                const analyticsData = [
                    ['ANALYTICS & INSIGHTS'],
                    [''],
                    ['STATUS DISTRIBUTION'],
                    ['Status', 'Count', 'Percentage', 'Total Cost (AED)'],
                    ['Completed', completed, completionRate + '%', tasks.filter(t => t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0).toLocaleString()],
                    ['Pending', pending, ((pending/tasks.length)*100).toFixed(1) + '%', tasks.filter(t => !t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0).toLocaleString()],
                    [''],
                    ['COST BY CATEGORY'],
                    ['Category', 'Tasks', 'Total Cost (AED)'],
                ];

                // تجميع حسب الفئة
                const categories = {};
                tasks.forEach(t => {
                    if (!categories[t.category]) {
                        categories[t.category] = { count: 0, cost: 0 };
                    }
                    categories[t.category].count++;
                    categories[t.category].cost += t.cost;
                });

                Object.keys(categories).sort((a,b) => categories[b].cost - categories[a].cost).forEach(cat => {
                    analyticsData.push([cat, categories[cat].count, categories[cat].cost.toLocaleString()]);
                });

                analyticsData.push(['']);
                analyticsData.push(['LOCATION ANALYSIS']);
                analyticsData.push(['Location', 'Tasks', 'Total Cost (AED)']);

                // تجميع حسب الموقع
                const locations = {};
                tasks.forEach(t => {
                    if (!locations[t.location]) {
                        locations[t.location] = { count: 0, cost: 0 };
                    }
                    locations[t.location].count++;
                    locations[t.location].cost += t.cost;
                });

                Object.keys(locations).sort((a,b) => locations[b].cost - locations[a].cost).forEach(loc => {
                    analyticsData.push([loc, locations[loc].count, locations[loc].cost.toLocaleString()]);
                });

                const wsAnalytics = XLSX.utils.aoa_to_sheet(analyticsData);
                wsAnalytics['!cols'] = [{wch: 25}, {wch: 15}, {wch: 20}, {wch: 20}];
                XLSX.utils.book_append_sheet(wb, wsAnalytics, 'Analytics');

                // ========== SHEET 4: SUMMARY ==========
                const summaryData = [
                    ['AUS MAINTENANCE SYSTEM'],
                    ['EXECUTIVE SUMMARY'],
                    [''],
                    ['Report Date:', new Date().toISOString().split('T')[0]],
                    ['Academic Year:', '2025-2026'],
                    [''],
                    ['=== OVERVIEW ==='],
                    ['Total Number of Tasks:', tasks.length],
                    ['Completed Tasks:', completed],
                    ['Pending Tasks:', pending],
                    ['Completion Rate:', completionRate + '%'],
                    [''],
                    ['=== FINANCIAL SUMMARY ==='],
                    ['Total Project Cost:', 'AED ' + totalCost.toLocaleString()],
                    ['Completed Cost:', 'AED ' + tasks.filter(t => t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0).toLocaleString()],
                    ['Pending Cost:', 'AED ' + tasks.filter(t => !t.status.includes('Completed')).reduce((s,t) => s + t.cost, 0).toLocaleString()],
                    ['Average Cost per Task:', 'AED ' + avgCost.toLocaleString()],
                    [''],
                    ['=== PRIORITY BREAKDOWN ==='],
                    ['Critical Tasks:', tasks.filter(t => t.priority.includes('Critical')).length],
                    ['High Priority:', tasks.filter(t => t.priority.includes('High')).length],
                    ['Medium Priority:', tasks.filter(t => t.priority.includes('Medium')).length],
                    ['Low Priority:', tasks.filter(t => t.priority.includes('Low')).length],
                    [''],
                    ['=== TOP COST ITEMS ===']
                ];

                // أعلى 5 مهام من حيث التكلفة
                const topCosts = [...tasks].sort((a,b) => b.cost - a.cost).slice(0, 5);
                topCosts.forEach((t, i) => {
                    summaryData.push([`${i+1}. ${t.title}`, 'AED ' + t.cost.toLocaleString()]);
                });

                const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
                wsSummary['!cols'] = [{wch: 35}, {wch: 25}];
                XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

                // تنزيل الملف
                XLSX.writeFile(wb, 'AUS_Maintenance_Professional.xlsx');

                document.getElementById('loading').style.display = 'none';
                document.getElementById('status').style.display = 'block';

                setTimeout(() => {
                    document.getElementById('status').style.display = 'none';
                }, 5000);

            } catch (error) {
                alert('حدث خطأ: ' + error.message + '\n\nتأكد من وجود ملف AUS_Maintenance_Data.json');
                console.error(error);
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
