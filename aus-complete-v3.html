<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUS Maintenance Management System</title>
    
    <!-- External Resources -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* ===================================
           GLOBAL STYLES & RESETS
        =================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Color Scheme - Power BI Dark Navy Theme */
            --navy: #0D1B2A;
            --dark-blue: #1B3A5C;
            --accent: #2563A8;
            --accent-light: #3B82F6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --info: #06B6D4;
            
            /* Neutrals */
            --white: #FFFFFF;
            --light-gray: #F3F4F6;
            --gray: #9CA3AF;
            --dark-gray: #4B5563;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', 'Calibri', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--dark-blue) 100%);
            color: var(--dark-gray);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===================================
           LOGIN PAGE STYLES
        =================================== */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy) 0%, var(--dark-blue) 100%);
            position: relative;
            overflow: hidden;
        }

        .login-container::before,
        .login-container::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .login-container::before {
            width: 500px;
            height: 500px;
            top: -250px;
            right: -250px;
            animation-delay: 0s;
        }

        .login-container::after {
            width: 300px;
            height: 300px;
            bottom: -150px;
            left: -150px;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .login-box {
            background: var(--white);
            padding: 50px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .school-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .school-logo img {
            max-width: 120px;
            height: auto;
            margin-bottom: 15px;
        }

        .school-logo .logo-placeholder {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--white);
        }

        .login-box h1 {
            color: var(--navy);
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 700;
        }

        .login-box p {
            color: var(--gray);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark-gray);
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 168, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 168, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: var(--danger);
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ===================================
           MAIN APP CONTAINER
        =================================== */
        .app-container {
            display: none;
            min-height: 100vh;
            background: var(--light-gray);
        }

        .app-container.active {
            display: flex;
        }

        /* ===================================
           SIDEBAR
        =================================== */
        .sidebar {
            width: 280px;
            background: var(--navy);
            color: var(--white);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h2::before {
            content: '🏫';
            font-size: 24px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin: 0;
        }

        .user-info {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }

        .user-info p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 4px;
        }

        .user-info strong {
            color: var(--white);
        }

        .nav-menu {
            flex: 1;
            padding: 16px 0;
            list-style: none;
        }

        .nav-item {
            margin: 4px 16px;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-item a i {
            width: 20px;
            font-size: 16px;
        }

        .nav-item a:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
            transform: translateX(4px);
        }

        .nav-item.active a {
            background: var(--accent);
            color: var(--white);
        }

        .logout-btn {
            margin: 16px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: var(--white);
        }

        /* ===================================
           MAIN CONTENT
        =================================== */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 32px;
            overflow-y: auto;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease-in;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            color: var(--navy);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .page-header p {
            color: var(--gray);
            font-size: 15px;
        }

        /* ===================================
           DASHBOARD - KPI CARDS
        =================================== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
        }

        .kpi-card.success::before { background: var(--success); }
        .kpi-card.warning::before { background: var(--warning); }
        .kpi-card.danger::before { background: var(--danger); }
        .kpi-card.info::before { background: var(--info); }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .kpi-card h3 {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-card .value {
            font-size: 36px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .kpi-card .change {
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .kpi-card .change.positive {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .kpi-card .change.negative {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        /* ===================================
           DASHBOARD - SMART ALERTS
        =================================== */
        .smart-alerts {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 32px;
        }

        .smart-alerts h2 {
            font-size: 18px;
            color: var(--navy);
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-item {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: start;
            gap: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .alert-item:last-child {
            margin-bottom: 0;
        }

        .alert-item.warning {
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid var(--warning);
        }

        .alert-item.danger {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--danger);
        }

        .alert-item.info {
            background: rgba(6, 182, 212, 0.1);
            border-left: 4px solid var(--info);
        }

        .alert-item i {
            font-size: 18px;
            margin-top: 2px;
        }

        .alert-item.warning i { color: var(--warning); }
        .alert-item.danger i { color: var(--danger); }
        .alert-item.info i { color: var(--info); }

        /* ===================================
           DASHBOARD - CHARTS
        =================================== */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .chart-card h3 {
            font-size: 16px;
            color: var(--navy);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* ===================================
           BUTTONS & CONTROLS
        =================================== */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }

        .btn-danger:hover {
            background: #DC2626;
        }

        .btn-secondary {
            background: var(--light-gray);
            color: var(--dark-gray);
        }

        .btn-secondary:hover {
            background: #E5E7EB;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* ===================================
           TASK TRACKER - TOOLBAR
        =================================== */
        .toolbar {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .toolbar input[type="text"],
        .toolbar select {
            padding: 10px 14px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .toolbar input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        .toolbar input[type="text"]:focus,
        .toolbar select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .toolbar select {
            min-width: 150px;
        }

        /* ===================================
           TASK TRACKER - TABLE
        =================================== */
        .table-container {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 2000px;
        }

        thead {
            background: var(--navy);
            color: var(--white);
        }

        thead th {
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        tbody tr {
            border-bottom: 1px solid #E5E7EB;
            transition: background-color 0.2s ease;
        }

        tbody tr:hover {
            background: var(--light-gray);
        }

        tbody tr.completed {
            background: rgba(16, 185, 129, 0.05);
        }

        tbody tr.overdue {
            background: rgba(239, 68, 68, 0.05);
        }

        tbody td {
            padding: 12px;
            vertical-align: middle;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge.low { background: #DBEAFE; color: #1E40AF; }
        .badge.medium { background: #FEF3C7; color: #92400E; }
        .badge.high { background: #FED7AA; color: #9A3412; }
        .badge.critical { background: #FEE2E2; color: #991B1B; }

        .badge.pending { background: #E0E7FF; color: #3730A3; }
        .badge.in-progress { background: #DBEAFE; color: #1E40AF; }
        .badge.completed { background: #D1FAE5; color: #065F46; }
        .badge.on-hold { background: #FEF3C7; color: #92400E; }
        .badge.cancelled { background: #F3F4F6; color: #374151; }

        .health-score {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .health-score.excellent {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .health-score.good {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-light);
        }

        .health-score.fair {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .health-score.poor {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        /* ===================================
           MODAL
        =================================== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            border-radius: 12px;
            padding: 32px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 24px;
            color: var(--navy);
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--gray);
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--danger);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-grid .form-group {
            margin-bottom: 0;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E5E7EB;
        }

        /* ===================================
           SCHEDULE PAGE
        =================================== */
        .schedule-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .schedule-annual {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        .schedule-table {
            min-width: 1200px;
        }

        .schedule-table th {
            background: var(--navy);
            color: var(--white);
            padding: 12px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }

        .schedule-table td {
            padding: 10px;
            text-align: center;
            border: 1px solid #E5E7EB;
        }

        .schedule-table .task-name {
            text-align: left;
            font-weight: 600;
            min-width: 200px;
        }

        .task-status-icon {
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.2s ease;
        }

        .task-status-icon:hover {
            transform: scale(1.2);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .calendar-day {
            aspect-ratio: 1;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            min-height: 100px;
        }

        .calendar-day:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .calendar-day .day-number {
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 4px;
        }

        .calendar-day .task-count {
            font-size: 12px;
            color: var(--gray);
        }

        .calendar-day.completed {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
        }

        .calendar-day.in-progress {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--warning);
        }

        .calendar-day.overdue {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--danger);
        }

        /* ===================================
           ANALYTICS PAGE
        =================================== */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .metric-card {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .metric-value {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent);
            margin: 12px 0;
        }

        .metric-label {
            font-size: 14px;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-target {
            font-size: 12px;
            color: var(--dark-gray);
            margin-top: 8px;
        }

        /* ===================================
           VENDORS PAGE
        =================================== */
        .vendor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .vendor-card {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .vendor-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .vendor-card h3 {
            font-size: 18px;
            color: var(--navy);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .vendor-specialty {
            color: var(--accent);
            font-size: 14px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .vendor-info {
            font-size: 13px;
            color: var(--dark-gray);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vendor-info i {
            width: 16px;
            color: var(--gray);
        }

        .vendor-rating {
            color: #F59E0B;
            font-size: 16px;
            margin: 12px 0;
        }

        .vendor-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #E5E7EB;
        }

        /* ===================================
           SETTINGS PAGE
        =================================== */
        .settings-section {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        .settings-section h2 {
            font-size: 18px;
            color: var(--navy);
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #E5E7EB;
        }

        .settings-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .settings-item label {
            display: block;
            font-weight: 600;
            color: var(--dark-gray);
            margin-bottom: 8px;
        }

        .settings-item input,
        .settings-item select {
            width: 100%;
            max-width: 400px;
            padding: 10px 14px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        /* ===================================
           LOADING SPINNER
        =================================== */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===================================
           RESPONSIVE
        =================================== */
        @media (max-width: 968px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .main-content {
                margin-left: 0;
            }

            .kpi-grid,
            .chart-grid {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
            }

            .toolbar input,
            .toolbar select {
                width: 100%;
            }

            table {
                font-size: 12px;
            }

            thead th, tbody td {
                padding: 8px;
            }
        }
    </style>
